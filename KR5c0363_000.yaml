天浮松蘿萬縷垂絲挂碧煙幾千年久尚翩蹮十分换得朝衣闊金闕全身遍萬天不空禽道宗莊老學虛無為善孳孳亦舜徒相彼鳥分言外意三千功行實工夫烏鴉來柏臺中效駿奔紀官如鳳職賔門朝天有客群呼報領袖鵷班覲聖尊半部樂太清雅奏世希音非竹非絲五色禽韶舞平分群祝慶來儀靈鳳一般心我師禽道無不在性存存蠢動含靈必有尊職教之功同覆載此身誰可外乾坤白雉雞羽衣純碧益州神東向靈山護聖真化作翔庭巢閣鳳翼扶帝輦上天津靈壽杖喬松老骨谷神耆太乙真精古杖藜免得孔光姦手污住山歲數與天齊騫林樹七寶林中上界奇枝枝翡翠葉琉璃若非大頂居天上安得靈根獨有之定心松蒼官天挺挾人豪片石無根萬丈高倚作泰山窺斗絶擎空翠蓋鐵身牢雲竹杖全身賜紫晦林泉當國持危是大賢世道康莊天步穩葛翁禮請伴神仙天燈陰崖絶壑溜淙淙暮夜玲瓏八面窗恍見九霄神變化幾枝光焰炯銀缸石燈心寸寸剛腸道體全無窮光焰照無邊蘭膏不斷燒難燼萬古人間是曉天黃精苗帶純陽伴鹿眠根頭充實幾經年夜爐和月烹金液飯不青精亦可仙蒼术煎賤同草芥貴金瑰换骨成仙火是媒造化鼎中熬煉到長生藥不在蓬萊黑虎丹威風肅肅賽熊貙野壁山墻暮夜餘匕劑中間牙爪奮癢痾疾痛是黔驢川芎餅疾攻頭目苦虛疼攻疾仙家藥力弘片片雪花魁蜀産不須灌頂説三乘艾煎元荆榛叢裏有參苓帝造鍾英地又靈任是七年真病久汞爐勳業炳丹青甜茶修真苦淡味仙靈自種雲腴摘玉英亘古與人甘齒頰春風百萬億蒼生武當圖本步九層霄閲太和盤旋八百里山河千章錦繡詩難盡一幅丹青畫了麼風月好懷時更别煙雲變態處如何看圖看透圖之外方見山間景趣多武當紀勝集
