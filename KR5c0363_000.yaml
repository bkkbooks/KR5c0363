body:
  text: 龍興路雲麓樵翁羅霆震撰樵歌首章採樵遠到太和山山在神仙洞府間風露九霄丹闕近乾坤萬古白雲間吟情月脅邊消遣步武天心處往還樂地更多天更闊不知身外有塵寰次章洞天福地滿寰區拱北來朝北帝居赫赫武當聯艮嶽巍巍大頂壓坤輿無邊聖化身金闕最上神霄相玉虛嘉會風雲依日月祝香班幸列霞裾界山天上人間跬步殊到均陽境入雲衢飄飄自有神仙氣踴躍東風詠舞雩浪河涓滴流成海樣多雨餘萬壑總鯨波杖藜穩代啇川擑拜賜晴天過險坡梅溪壬癸儲精育聖神坎中陽露發生仁仁根遍地南枝暖帝造充為天下春觀莊沆瀣餐英天上仙也儲天廪富天田山中火棗交梨外腐積囷倉介壽年城子裏匝緑堆紅錦四圍天然圖畫此山溪循環一罅通門徑松竹巖前桃杏蹊蒿口一邊蕭艾一芝蘭利欲關頭道義關凡聖兩岐爭轉腳五雲多處是蓬山天下武當入聖超玄第一關均陽福地甲人寰際天所覆宗辰極萬古乾坤共此山接待庵薄海擎香獻壽煙誰能辟穀挾飛仙驛亭餉飽青精飯著力登山即九天茅坡土地貢巖縮酒薦芬芬外護靈山效職勤若是有功當上賞也同封土賜元勳山神堂不假丹青亦闡靈祠庭氣力地精英道心泯作人心者霹靂無聲也震驚外朝峰草木通靈感聖恩山山隨衆謁金門遙岑回首招仙侣接引同班覲至尊黑虎祠變豹初頭未炳文文章不露已超群玄天約束巡廊了爪距深藏鐵色雲浩劫之家鼇極初來直至今户庭歲月幾何深羲農以上人如在幼子童孫太古心瘞劍堠有誰出岫片雲孤花月為妖媚半途雷斧暗藏黃壤酒邪精褫魄死酆都磨針澗淬礪功多粗者精聖師邀請上天京我心匪石堅於石小器成時大道成羊河江地不居延蘇子卿水非羝乳始何名源頭却是靈泉脈到海門邊流也清磨劎澗帝真合是鎮玄天奉勑鎔金冶紫煙三尺展開橫海嶽肅清宇宙一龍泉隱仙巖爐鼎消磨日月多山中衮繡一青蓑白雲也不知仙迹今在何天鳴玉珂山門洞天深敻萬峰青乾户弘開夜不扃步步此關參得透一條仙徑上青冥朝帝峰上聖天臨駐曉鑾龍翔鳳舞萬山盤前峰宰執峨冕冤望闕嵩呼祝壽安誦經臺仙梵聲揚感萬靈靈壇字字響天庭當時聽講龍君座依舊連珠列五星望仙亭大頂今為啓聖鄉十洲三島在均陽衆真想像歸旌旆朝跨蒼龍夕綵凰會仙坡蓬萊十四聖天人聚太和山謁帝真説透微危精一外一般堯舜禹心神會仙橋洲泉浩浩駕星河普濟諸天謁太和幾度好風明月夜鏘鸞躍鳳響鳴珂日月池天德輝華炯帝前地無兩曜地非天山中光景天為一晝夜雷鳴兩洞泉五龍宫金闕巍煌逼紫微純陽氣數發光輝三峰示現真頭角護駕沖升夾日飛聚仙巖近五龍宮擬會朝帝家玉帛萬諸侯山頭整肅班聯處依約五城十二樓聖誕朝賀一萬誠心萬聖真祝香何地不身親年年春月如朝市海角天涯也有人天宫寶山懸隔世塵囂高九層霄又九霄樓閣五雲新綵結三清三境共逍遙上升朝賀武當如布滿乾坤沖舉皆親見帝尊大頂根頭高第一登高雷拜謁天閽三清殿太上宫庭本自然瑶空梵氣有無邊垂光移下三真境别箇人間天上天玉皇殿重明麗正儼端門金闕人天兩至尊宗主萬方臣六合顯幽一樣宰乾坤玄帝正殿宫闕威嚴肅洞天群峰環翠立群仙巍巍黼座端辰極億兆神人拜御前明真殿元始初來幾化身再投父母造乾坤天宫內展家庭禮上界雙親帝后尊蓬真殿三天十四聖聯班勳德巍煌宇宙間金闕化身開帝座風雲慶會武當山七皇閣一一胚渾太極先玉清而次至玄天在天堯舜湯文武作者均如古聖賢桂籍殿職聯上相主文昌積行名賢席寵光到此即登蟾闕內高枝攀動九天香元皇殿三清宰輔判玄元義重金蘭兩聖賢七曲分靈同闡化摩夷天亦太和天三茅真君殿赤城戲罷跨龍來兄弟相聯自衮台榮甚西班增焜耀主人金闕倚天開五龍閣夾日迎將帝駕升賞功知得便飛騰彰施采色金鱗甲同上凌煙最上層雷堂洞淵帝帥宅神霄霹靂聲雄馘萬妖收斂神功歸掌握威而不猛肅班朝雷司趙帥堂前身酆嶽鬼中王制閫京西鎮古襄風雨攝歸玄帝部更教天上總關張雷司孟帥堂當年壯志在中原破蔡亡金正為元天恐雷霆無紏察三天借重溥天恩五龍井興漢元年聚處星湧泉成坎匝祠庭淵潛一一飛天去地脈香甘萬古靈五百靈官祠神人萬億戴玄天列職分司者半千兩序摳趍風夾動臯夔稷契舜群賢鍾樓擎天立柱駕梁虹發越鯨音氣量洪如法大鳴應大和金聲玉振九霄中步雲樓非霧非煙最上頭九霞光裏露岧嶢朝元第一層高處玉筍班聯碧玉霄功德司録善天官有職存末將香火當奇勳其間行滿三千者卷卷金書玉册文海山堂洞府中間洞府開普天共作一蓬萊煙飄雨笠風雲會不是神仙不到來提舉知宫位規模上界統群仙小樣鈞衡領衆賢坐定老君高玉局主持天下洞中天知副宫位為保為師道體同聖真均賴亮天工心心協濟周公事此是靈壇一召公真官堂輔正除邪禁不祥職嚴主宰鎮祠場誘吾松桂欺雲壑袖有彈文奏帝傍齋堂味飽雲厨養氣元煙瓢露鉢起龍蟠丹田更有黃金粟粒粒神仙不老丹紫雲道域化身開化到人間元是天真天上班再造武當三洞府方蓬瀛列海三山祖堂道派相傳奕葉光仙魂多在白雲鄉孝思縹眇爐煙裊通地通天一瓣香宣慰祠堂泰山後裔舊臣鄰身是仙山會上人硬鐵脊梁功德主此心道老在高真尊宿堂飽唐日月香山老傲漢乾坤芝嶺仙嘉會風雲環四座逍遙今古靜中天官廳煌煌曉日駐驂鸞指準聯班祝壽安閶闔一開天北闕嵩呼雷動儼衣冠清心堂穩泊虛舟安樂窩山林那解有風波一泓止水澄方寸納得無雲泰宇多塵勞道侣野馬塵埃擾俗緣賤中剩有貴神仙香泉萬斛雲千頃晝日耕雲晚汲泉真常遺烈開闢靈壇棘刺林空拳做出屋黃金萬年香火炎炎盛一片中興鐵石心承應仙遊幾捧天書雨露香風霆握在掌中央劍函蛻了仙魂往尚想鞭鸞入帝鄉沖虛庵融融幽雅冰和氣洞洞莊生室大空玄教宗儒天地闊無邊風月草庭中月庵八窗一樣玉玲瓏放大光明此性中皎皎萬山天不夜全家住在桂華宫白雪庵長年境界住瑶華鶴氅交輝六出葩清夜更添香滿屋四圍鋤月種梅花雲山書隱治平大學大勳庸寓在明明德性中出岫略施膚寸用飽藏時雨待東風講師函丈再抽關鑰啓顓蒙學漆園翁河上公洞府藏身人不見藏心更在六經中五龍頂寶蓋擎空節節拋飛樓湧殿碧雲坳分眀煙霧中頭角一派星峰乾一爻天池絶頂峰高幾萬尋銀潢注水慶源深早為四海蒼生計火日如焚便作霖上龍池第一泉高際碧穹中藏神物養威雄時來帝命蘇霖雨先下天邊海若宮黑龍潭淵底濳鱗且蟄蹤坎宫純水養神功恩波滿注高峰頂四海風雲在此中煉丹池先天祖氣久胚渾爐鼎陰陽更互根滴滴金膏仙造化半泓泉罅有天門金鼎峰耳鉉規模三足形儼然九牧鑄初成帝家重器傳千古柱地承天鎮八紘金鎖峰妖魔牢錮鐵酆都更鍊精剛禁逆徒霧繞煙圍添錧鑰兩間清肅一邪無龍廟一身造化挾風霆受用爐煙杳氣形聽候九天符命到八荒霖雨捲滄溟六甲峰天騶萬億衆威靈奉勑分曹翊帝庭顯現震東陽木位將軍戈甲立真形六丁峰炎炎陰火赫真精爻列雲端耀日明幾檄八公山草木號風吼雨震天聲疊宇峰蒼頡神通造化靈雲章鳳篆切生成層層又似磨崖頌摸寫中天日月明三公巖雲頭一品列崇岡氣象尊嚴坐廟堂開闔風雷神變化經邦論道理陰陽九卿巖兩間氣數屬陰晴軒豁雲房瑣闥青大小諸峰端笏坐宛然面棘位王庭中笏峰格樣桓圭立正班群山霞珮列回環分明人在朝元殿面挹天光近聖顔大筆峰撑天柱地管城君脫穎緘封五色雲一紙青霄供翰墨星辰日月炳乾文中筆峰第二中山派姓毛子孫收拾總英豪大書德行安銀管揭在雲頭甲第高讀書巖六經未作用先存玄教仍從此入門中有玉虛師相位贊襄天上帝王尊千丈峰五倍參天蜀柏高喬松磊砢怒風號撑擎宇宙西南蓋一柱巍巍奠極鼇五總山天上連珠列宿精人間政府位朝廷常真現出神龜象宇宙中間統氣形小筆峰誰製纖毫頓碧雲王家無用草書人仙翁擬寫箋天表翰染浮香達紫宸師子峰山頂巖巉聳具瞻獸中王者勢尊嚴秋風草木金毫動萬怪嘷狐總伏潛中鼻峰相盡群山面目妍當心大貴準隆然擡頭兩孔撩天坐透頂薰香玉陛前香爐峰嶺頭日暖瑞生煙金獸濃薰介壽年帝造無私公四海壽家壽國壽人天竹篠峰稚荀行鞭出草茸嶺高叢矮蘸煙濃長房選取為仙杖投葛陂中也化龍桃溪道域漁郎今度訪雲關髣佛仙源在此間人向玉京天上去蛻函空鎮劍文班桃源洞天香泛作武陵春山自多仙豈為秦聖代子孫均介壽衣冠那更是秦人紫蓋峰山光閃爍暮煙凝高罩觚稜最上層帝輦在天間綵仗凌霄想見舊飛騰大蓮峰君子亭亭樣一般根株闊遠萬山盤花開十丈如船藕泰華峰頭至小看小蓮峰玉井移來藕子孫那資雨露發生春他時借與菩提座結束西方一聖人奈子坡地産英華剩土芬山靈萃作果中珍秋風顆顆金丹熟待與蟠桃壽帝君落帽峰挂卻塵冠住嶺雲一頭改便舊精神天風也捲烏紗去端冕趍朝拜紫宸紫芥雲峰仙家法雨起蓬萊膚寸悠然遍九垓天下山川之所出一時慶會此中來三斗巖鼎分石竅枕崔嵬對月何人共一杯莫是汝陽酣醉日朝天留下酒壼來藏雲巖從龍雖好且濳蹤五色光韜繡谷中縱是有心休出岫一天時雨待春風大明山聖境純陽粹育乾祥光焕發四無邊匪朝匪夕乾坤别常是中街正午天槎牙峰突如古木枕嵯峨春到生生意亦多斫取一枝雷吏斧也同仙客上天河聚雲峰瑞氣浮空以類從帝真乘駕是神龍異香蓊鬱靈山頂萬聖來朝天九重朱砂巖造化爐丹煉逼真養成火樹艷精神仙家碎入黃金碾宇宙回陽物物春眉稜山古之吏隱可廉頑芝宇分明元魯山怒見元規塵滿面撑開雙眼看人間伏魔峰咫尺天門已化魚以潛為躍且舒徐隆中不必求丞相諸葛今來此地居俞公巖山翁愛殺碧山棲郡是河間派紫芝背負河圖神易去想從上古訪羲雞鳴峰凡羽成仙住碧雲占高地步越超群洞天之曉先天下器大聲閎舉世聞常春巖滿谷仙花錦繡莊四時不斷九天香帝真充拓生生造一粒丹回宇宙陽獨陽巖分曉先天已畫圖山山艮象易規模畜之火者其天大骨力純陽别箇無竈門山買桂供薪到嶺尖煙樓可撞聳群瞻漢王到此衣曾燎爇起中天火德炎手爬山水淺蓬萊雲路遙群仙來此駕天橋同時高展麻姑爪攀到峰頭是碧霄尹喜巖道之所隱即仙靈心印函關道德經不待卭州乘鶴去此山仙已是天庭健人峰堅亥雄奔步九州向前開闢幾千秋斷鼇怒見共工觸頂住天西北角頭卧雲巖出山失腳偶從龍施雨歸來睡思濃且放希夷伸四體不愁夢不到商宗雲霧巖隱豹藏龍瑞氣蒸真仙同此宅真靈飈車來往無形表想有樓臺混杳冥滴水巖密敲金鎖溜星河好在垂銀一線多不是為霖牢閉鑰砯崖轉石起風波大青羊澗水脈應連洛洞中滿溪怪石是癡龍地仙九館知非遠掇境來朝天九重小青羊澗洞庭放牧怨終身龍女雖神未入神潔己驅來求證果片心剛化石粼粼歇仙巖御氣乘風遍萬天衆真日夕走雲軿暫停珂珮瑶華洞列坐飛觴玳瑁筵皂纛峰玄天鎮古肅天威絶頂高張黑殺旗不假大神雙臂力風雲四面永撑持希夷巖仙家妙法得心傳夢飽煙霞伴腳眠推枕起觀天下事和雲移榻華山巔亂石峰初平深入碧煙霞遺下羊群幾歲華本體若經仙點化漫山光焰總丹砂仙侣巖煙霞老友